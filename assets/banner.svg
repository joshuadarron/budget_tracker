<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="412" viewBox="0 0 1200 412" preserveAspectRatio="xMidYMid slice">
  <!--
    Budget Tracker banner. Soft palette:
      mint #dCEbe2  teal #cfe6e4  periwinkle #d8e4ee
      sage #7fb89a  deep teal #5aa39b  ink #2c4a3e  muted #5f8a78  amber #e8c98c
  -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dcebe2"/>
      <stop offset="55%" stop-color="#cfe6e4"/>
      <stop offset="100%" stop-color="#d8e4ee"/>
    </linearGradient>
    <radialGradient id="glow-left" cx="20%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#7fb89a" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#5aa39b" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-right" cx="85%" cy="65%" r="55%">
      <stop offset="0%" stop-color="#9fcfd2" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="logo-aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7fb89a" stop-opacity="0.40"/>
      <stop offset="45%" stop-color="#5aa39b" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="412" fill="url(#bg)"/>
  <rect width="1200" height="412" fill="url(#glow-left)"/>
  <rect width="1200" height="412" fill="url(#glow-right)"/>

  <!-- soft sage dot texture -->
  <g fill="#5f9379">
    <circle cx="86" cy="62" r="1.4" opacity="0.30"/>
    <circle cx="214" cy="38" r="1.1" opacity="0.24"/>
    <circle cx="358" cy="84" r="1.3" opacity="0.28"/>
    <circle cx="512" cy="46" r="1.0" opacity="0.22"/>
    <circle cx="708" cy="58" r="1.2" opacity="0.26"/>
    <circle cx="884" cy="32" r="1.4" opacity="0.30"/>
    <circle cx="1024" cy="74" r="1.1" opacity="0.24"/>
    <circle cx="1138" cy="36" r="1.0" opacity="0.22"/>

    <circle cx="46" cy="178" r="1.2" opacity="0.24"/>
    <circle cx="172" cy="232" r="1.0" opacity="0.20"/>
    <circle cx="288" cy="146" r="0.9" opacity="0.18"/>
    <circle cx="406" cy="270" r="1.1" opacity="0.22"/>
    <circle cx="780" cy="218" r="0.9" opacity="0.18"/>
    <circle cx="932" cy="262" r="1.2" opacity="0.24"/>
    <circle cx="1080" cy="178" r="1.0" opacity="0.20"/>
    <circle cx="1170" cy="248" r="1.1" opacity="0.22"/>

    <circle cx="118" cy="356" r="1.0" opacity="0.20"/>
    <circle cx="246" cy="386" r="0.9" opacity="0.18"/>
    <circle cx="402" cy="362" r="1.1" opacity="0.22"/>
    <circle cx="540" cy="394" r="0.9" opacity="0.18"/>
    <circle cx="746" cy="380" r="1.0" opacity="0.20"/>
    <circle cx="908" cy="354" r="0.9" opacity="0.18"/>
    <circle cx="1062" cy="392" r="1.0" opacity="0.20"/>

    <circle cx="320" cy="218" r="0.7" opacity="0.16"/>
    <circle cx="558" cy="194" r="0.7" opacity="0.16"/>
    <circle cx="690" cy="172" r="0.6" opacity="0.14"/>
    <circle cx="852" cy="208" r="0.6" opacity="0.14"/>
    <circle cx="1006" cy="246" r="0.6" opacity="0.14"/>
    <circle cx="142" cy="118" r="0.7" opacity="0.16"/>
    <circle cx="958" cy="118" r="0.7" opacity="0.16"/>
  </g>

  <!-- icon (minimalist clock, dollar sign at 12 o'clock) -->
  <g transform="translate(600 118)">
    <circle r="74" fill="url(#logo-aura)"/>
    <g transform="translate(-48 -49.5) scale(1.5)">
      <circle cx="32" cy="35" r="16" fill="#1d3a30" opacity="0.10"/>
      <circle cx="32" cy="33" r="16" fill="#ffffff" stroke="#7fb89a" stroke-width="2.5"/>
      <g stroke="#7fb89a" stroke-width="2" stroke-linecap="round">
        <line x1="45.5" y1="33" x2="47.5" y2="33"/>
        <line x1="32" y1="46.5" x2="32" y2="48.5"/>
        <line x1="16.5" y1="33" x2="18.5" y2="33"/>
      </g>
      <text x="32" y="25.5" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif" font-size="11" font-weight="700" fill="#c28a3a">$</text>
      <g stroke="#2c4a3e" stroke-linecap="round" fill="none">
        <line x1="32" y1="33" x2="41" y2="25" stroke-width="2.5"/>
        <line x1="32" y1="33" x2="25" y2="27" stroke-width="3"/>
      </g>
      <circle cx="32" cy="33" r="2" fill="#2c4a3e"/>
    </g>
  </g>

  <text x="600" y="266"
        text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="64"
        font-weight="600"
        fill="#2c4a3e"
        letter-spacing="-0.5">Budget Tracker</text>

  <text x="600" y="308"
        text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="13"
        font-weight="500"
        fill="#5aa39b"
        letter-spacing="3.2">HEADLESS MONTHLY FINANCIAL AUTOMATION</text>

  <line x1="380" y1="336" x2="820" y2="336" stroke="#7fb89a" stroke-width="1" opacity="0.45"/>

  <g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
     font-size="11"
     font-weight="600"
     fill="#5f8a78"
     letter-spacing="2.6"
     opacity="0.8">
    <text x="430" y="376" text-anchor="middle">SYNC</text>
    <text x="600" y="376" text-anchor="middle">BACKFILL</text>
    <text x="770" y="376" text-anchor="middle">NOTIFY</text>
  </g>
</svg>
